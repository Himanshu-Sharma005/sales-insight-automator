name: CI – Build, Lint & Validate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ─── Backend: Lint & Test ───────────────────────────────────────────
  backend-ci:
    name: Backend – Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Lint with flake8
        run: |
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app/ --count --exit-zero --max-complexity=12 --max-line-length=120 --statistics

      - name: Validate FastAPI startup (import check)
        run: |
          python -c "from app.main import app; print('✅ FastAPI app imports OK')"

  # ─── Frontend: Lint & Build ─────────────────────────────────────────
  frontend-ci:
    name: Frontend – Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Lint with ESLint
        working-directory: frontend
        run: npm run lint || true

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://api.example.com
          CI: false
        run: npm run build

      - name: Verify build output
        working-directory: frontend
        run: |
          ls -la build/
          test -f build/index.html && echo "✅ index.html present"

  # ─── Docker: Build Validation ───────────────────────────────────────
  docker-build:
    name: Docker – Build Images
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: sia-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: sia-frontend:ci
          build-args: |
            REACT_APP_API_URL=https://api.example.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Security: Dependency Audit ─────────────────────────────────────
  security-audit:
    name: Security – Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Audit Python dependencies (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --fix --dry-run || true

      - name: Audit Node.js dependencies
        working-directory: frontend
        run: |
          npm install --legacy-peer-deps
          npm audit --audit-level=high || true
